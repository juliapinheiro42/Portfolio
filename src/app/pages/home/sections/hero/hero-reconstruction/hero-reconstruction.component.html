<aside class="hero-reconstruction" [class.leaving]="isLeaving" [class.unstable]="isUnstable" aria-live="polite">
  <div class="rebuild-scan" aria-hidden="true"></div>
  <button class="skip-rebuild" type="button" (click)="skip()">skip rebuild</button>

  <div class="rebuild-console">
    <p class="rebuild-kicker">
      <span aria-hidden="true"></span>
      post-glitch reconstruction
    </p>

    <h2 data-text="Julia.dev interface rebuild">Julia.dev interface rebuild</h2>

    <div class="rebuild-lines">
      <p *ngFor="let line of config.statusLines; let index = index" [style.--line-delay.ms]="index * 310">
        {{ line }}
      </p>
    </div>
  </div>

  <div class="module-assembly" aria-hidden="true">
    <span class="connection-line line-one"></span>
    <span class="connection-line line-two"></span>

    <div
      class="rebuild-module"
      *ngFor="let module of config.modules; let index = index"
      [style.--module-delay.ms]="520 + index * 150"
      [style.--module-progress.%]="module.progress"
    >
      <strong>{{ module.label }}</strong>
      <i><b></b></i>
    </div>
  </div>
</aside>
